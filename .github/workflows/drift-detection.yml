name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 AM UTC

  repository_dispatch:
    types: [drift-check]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check for drift'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  TF_VERSION: '1.5.7'
  AWS_REGION: 'eu-west-2'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Terraform Drift Scan
  # - Checkout repo & connect Terraform Cloud API
  # - Run terraform plan to detect drift
  # - Parse plan output and extract resource IDs/ARNs
  # - Upload scan artifacts for downstream jobs
  # ═══════════════════════════════════════════════════════════════
  terraform-drift-scan:
    name: Terraform Drift Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    outputs:
      drift_detected: ${{ steps.plan.outputs.drift_detected }}
      exit_code: ${{ steps.plan.outputs.exit_code }}
      create_count: ${{ steps.parse.outputs.create_count }}
      update_count: ${{ steps.parse.outputs.update_count }}
      delete_count: ${{ steps.parse.outputs.delete_count }}
      replace_count: ${{ steps.parse.outputs.replace_count }}
      total_count: ${{ steps.parse.outputs.total_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017373135945:role/github_oidc_drift
          role-session-name: DriftDetectionSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: terraform init -input=false

      - name: Terraform Plan (Drift Detection)
        id: plan
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: |
          set +e
          MAX_RETRIES=2
          RETRY_DELAY=300  # 5 minutes
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Terraform plan attempt $attempt of $MAX_RETRIES"
            terraform plan -detailed-exitcode -input=false -no-color 2>&1 | tee /tmp/plan_output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            # Check for state lock error
            if grep -q "Error acquiring the state lock\|Error locking state\|Lock Info:" /tmp/plan_output.txt; then
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "⏳ State lock detected, waiting ${RETRY_DELAY}s before retry..."
                sleep $RETRY_DELAY
                continue
              else
                echo "❌ State lock persisted after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
            # If plan succeeded or found drift, also generate JSON output
            if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 2 ]; then
              echo "Generating JSON plan output..."
              terraform plan -json -detailed-exitcode -input=false 2>&1 > /tmp/plan_stream.jsonl || true
            fi
            break
          done
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Stage plan outputs for artifact upload
          cp /tmp/plan_output.txt ${{ github.workspace }}/plan_output.txt
          if [ -f /tmp/plan_stream.jsonl ]; then
            cp /tmp/plan_stream.jsonl ${{ github.workspace }}/plan_stream.jsonl
          fi
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ No drift detected - infrastructure matches Terraform state"
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "❌ Terraform plan failed with an error"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "⚠️ Drift detected - infrastructure differs from Terraform state"
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Check for plan errors
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "::error::Terraform plan failed. Check the logs above for details."
          exit 1
      - name: Parse Plan JSON Stream
        if: steps.plan.outputs.exit_code == '2'
        working-directory: terraform/${{ github.event.inputs.environment || 'dev' }}
        run: |
          # Parse the plan text output to identify changed resources
          echo "Parsing drift from plan output..."
          
          # Extract resource changes from plan output
          grep -E "^  # .* (will be|must be)" ${{ github.workspace }}/plan_output.txt > /tmp/drift_resources.txt 2>/dev/null || true
          
          # Count changes safely using a function
          count_matches() {
            local pattern="$1"
            local file="$2"
            if [ -f "$file" ]; then
              grep -c "$pattern" "$file" 2>/dev/null || echo 0
            else
              echo 0
            fi
          }
          
          CREATE_COUNT=$(count_matches "will be created" /tmp/drift_resources.txt)
          UPDATE_COUNT=$(count_matches "will be updated" /tmp/drift_resources.txt)
          DELETE_COUNT=$(count_matches "will be destroyed" /tmp/drift_resources.txt)
          REPLACE_COUNT=$(count_matches "must be replaced" /tmp/drift_resources.txt)
          
          # Ensure values are valid integers (default to 0)
          CREATE_COUNT=$((CREATE_COUNT + 0))
          UPDATE_COUNT=$((UPDATE_COUNT + 0))
          DELETE_COUNT=$((DELETE_COUNT + 0))
          REPLACE_COUNT=$((REPLACE_COUNT + 0))
          
          total_count=$(wc -l < /tmp/drift_resources.txt | tr -d ' ')
          echo "create_count=$CREATE_COUNT" >> $GITHUB_OUTPUT
          echo "update_count=$UPDATE_COUNT" >> $GITHUB_OUTPUT
          echo "delete_count=$DELETE_COUNT" >> $GITHUB_OUTPUT
          echo "replace_count=$REPLACE_COUNT" >> $GITHUB_OUTPUT
          echo "total_count=$total_count" >> $GITHUB_OUTPUT
          echo "Plan Summary: $CREATE_COUNT creates, $UPDATE_COUNT updates, $DELETE_COUNT deletes, $REPLACE_COUNT replacements."
          # Stage for artifact upload
          cp /tmp/drift_resources.txt ${{ github.workspace }}/drift_resources.txt
      - name: Upload Drift Scan Artifacts
        if: steps.plan.outputs.drift_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-scan-data
          path: |
            ${{ github.workspace }}/plan_output.txt
            ${{ github.workspace }}/plan_stream.jsonl
            ${{ github.workspace }}/drift_resources.txt
          retention-days: 7
          if-no-files-found: warn

      - name: No Drift Summary
        if: steps.plan.outputs.drift_detected == 'false'
        run: |
          echo "## ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure in **${{ github.event.inputs.environment || 'dev' }}** matches the Terraform state." >> $GITHUB_STEP_SUMMARY
  # ═══════════════════════════════════════════════════════════════
  # JOB 2: CloudTrail Lookup
  # - Download drift scan artifacts (resource IDs/ARNs)
  # - Connect AWS CloudTrail API
  # - Lookup events per drifted resource
  # - Find actor/who/when for each change
  # - Upload attribution artifacts
  # ═══════════════════════════════════════════════════════════════
  cloudtrail-lookup:
    name: CloudTrail Lookup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: terraform-drift-scan
    if: needs.terraform-drift-scan.outputs.drift_detected == 'true'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::017373135945:role/github_oidc_drift
          role-session-name: CloudTrailLookupSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Drift Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          name: drift-scan-data
          path: /tmp/drift-scan

      - name: Query CloudTrail for Attribution
        run: |
          bash scripts/drift-detection/query-cloudtrail.sh \
            /tmp/drift-scan/drift_resources.txt \
            /tmp/drift_resources_attributed.txt
          # Generate attribution table in Markdown format for GitHub Issue
          echo "### Drift Attribution Analysis" > /tmp/attribution_table.md
          echo "" >> /tmp/attribution_table.md
          echo "| Resource | Action | Actor Name | Actor ARN | Event Time |" >> /tmp/attribution_table.md
          echo "|---|---|---|---|---|" >> /tmp/attribution_table.md
          while IFS='|' read -r address action resource_type identifier actor_name actor_arn event_time; do
            [ -z "$address" ] && continue
            if [ "$actor_name" = "*(unavailable)*" ] || [ -z "$actor_name" ] || [ "$actor_name" = "-" ]; then
              actor_display="*(No CloudTrail event found)*"
              arn_display="-"
              time_display="-"
            else
              actor_display="**${actor_name}**"
              arn_display="\`${actor_arn}\`"
              time_display="$event_time"
            fi
            echo "| \`$address\` | $action | $actor_display | $arn_display | $time_display |" >> /tmp/attribution_table.md
          done < /tmp/drift_resources_attributed.txt
          echo "" >> /tmp/attribution_table.md
          echo "> ℹ️ CloudTrail lookup performed. Events older than 7 days cannot be queried." >> /tmp/attribution_table.md
          echo "Attribution table generated"
          cat /tmp/attribution_table.md
      - name: Upload CloudTrail Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudtrail-data
          path: |
            /tmp/drift_resources_attributed.txt
            /tmp/attribution_table.md
          retention-days: 7
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Create GitHub Issue & Notify
  # - Download drift scan + CloudTrail artifacts
  # - Generate documented GitHub issue with combined data
  # - Send Telegram notification
  # - Upload final drift report
  # ═══════════════════════════════════════════════════════════════
  create-github-issue:
    name: Create GitHub Issue & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [terraform-drift-scan, cloudtrail-lookup]
    if: needs.terraform-drift-scan.outputs.drift_detected == 'true'

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          cd scripts/drift-detection
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping"
          fi
      - name: Download Drift Scan Artifacts
        uses: actions/download-artifact@v4
        with:
          name: drift-scan-data
          path: /tmp/drift-scan

      - name: Download CloudTrail Artifacts
        uses: actions/download-artifact@v4
        with:
          name: cloudtrail-data
          path: /tmp/cloudtrail

      - name: Generate Issue Body
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CREATE_COUNT: ${{ needs.terraform-drift-scan.outputs.create_count }}
          UPDATE_COUNT: ${{ needs.terraform-drift-scan.outputs.update_count }}
          DELETE_COUNT: ${{ needs.terraform-drift-scan.outputs.delete_count }}
          REPLACE_COUNT: ${{ needs.terraform-drift-scan.outputs.replace_count }}
          TOTAL_COUNT: ${{ needs.terraform-drift-scan.outputs.total_count }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PLAN_OUTPUT=$(head -200 /tmp/drift-scan/plan_output.txt)
          if [ -f /tmp/cloudtrail/attribution_table.md ]; then
            ATTRIBUTION_SECTION=$(cat /tmp/cloudtrail/attribution_table.md)
          else
            ATTRIBUTION_SECTION="No attribution data available."
          fi
          cat > /tmp/issue_body.md << EOF
          ## Drift Detection Report
          | Field | Value |
          |-------|-------|
          | **Environment** | ${ENVIRONMENT} |
          | **Detected At** | ${TIMESTAMP} |
          | **Workflow Run** | [${RUN_ID}](${RUN_URL}) |
          ---
          ### Summary
          | Metric | Count |
          |--------|-------|
          | 🆕 Creates | ${CREATE_COUNT} |
          | 📝 Updates | ${UPDATE_COUNT} |
          | 🗑️ Deletes | ${DELETE_COUNT} |
          | 🔄 Replaces | ${REPLACE_COUNT} |
          | **Total** | **${TOTAL_COUNT}** |
          ---
          ${ATTRIBUTION_SECTION}
          ---
          ### Terraform Plan Output
          <details>
          <summary>Click to expand full plan output</summary>
          \`\`\`hcl
          ${PLAN_OUTPUT}
          \`\`\`
          </details>
          ---
          ### Remediation Options
          #### Option 1: Accept Drift (Update Terraform)
          \`\`\`bash
          cd terraform/${ENVIRONMENT}
          terraform plan
          \`\`\`
          #### Option 2: Revert Drift (Apply Terraform)
          \`\`\`bash
          cd terraform/${ENVIRONMENT}
          terraform apply
          \`\`\`
          ---
          *This issue was automatically created by the [drift detection workflow](${RUN_URL}).*
          EOF
          echo "Issue body generated"
      - name: Create GitHub Issue
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          ISSUE_URL=$(gh issue create \
            --title "🔴 Terraform Drift Detected - ${ENVIRONMENT} - ${DATE}" \
            --body-file /tmp/issue_body.md \
            --label "drift,infrastructure,automated,${ENVIRONMENT}")
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          echo "✅ Created issue: $ISSUE_URL"
      - name: Generate Drift Report JSON
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          bash scripts/drift-detection/generate-drift-report.sh \
            /tmp/cloudtrail/drift_resources_attributed.txt \
            /tmp/drift_report.json
          echo "✅ Drift report JSON generated"
      - name: Send Telegram Notification
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          cd scripts/drift-detection
          if [ -f notify_telegram.py ]; then
            python notify_telegram.py \
              --report /tmp/drift_report.json \
              --environment ${{ github.event.inputs.environment || 'dev' }} \
              --run-id ${{ github.run_id }}
          else
            echo "notify_telegram.py not found, skipping notification"
          fi
      - name: Upload Drift Report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: /tmp/drift_report.json
          retention-days: 7
          if-no-files-found: warn

      - name: Trigger AI Analysis (Optional)
        if: vars.ENABLE_AI_DRIFT_ANALYSIS == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Triggering AI-powered drift analysis workflow..."
          gh workflow run drift-analysis.lock.yml \
            -f environment="${{ github.event.inputs.environment || 'dev' }}" \
            || echo "⚠️ AI analysis workflow not available or failed to trigger"
      - name: Drift Summary
        run: |
          echo "## ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure drift was detected in the **${{ github.event.inputs.environment || 'dev' }}** environment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Issue Created**: ${{ steps.create_issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY